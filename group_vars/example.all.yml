---
# SSH
ssh_port: 2222
ssh_public_keys:
  - "CHANGE_ME"
# ssh_authorized_keys_exclusive: true  # default; set false to keep ad-hoc keys in root's authorized_keys

# System
hostname: "server"
timezone: "UTC"
system_locale: "en_US.UTF-8"
nofile_limit: 65535

# Swap
swap_size: "1G"
swap_swappiness: "10"

# Security
ssh_max_auth_tries: 3
ssh_allow_groups:
  - sudo
  - root
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 3
fail2ban_recidive_enabled: true
fail2ban_recidive_bantime: 604800   # 1 week
fail2ban_recidive_findtime: 86400   # 1 day
fail2ban_recidive_maxretry: 5

# Node Exporter
node_exporter_version: "1.11.1"
node_exporter_listen_address: "127.0.0.1:9100"

# Automatic Updates
unattended_upgrades_mail: ""
unattended_upgrades_auto_reboot: false
unattended_upgrades_auto_reboot_time: "02:00"

# Remote syslog forwarding (empty host = disabled)
remote_syslog_host: ""
remote_syslog_port: 514
remote_syslog_protocol: "tcp"   # "tcp" or "udp"
remote_syslog_facilities: "auth.*;authpriv.*;kern.*"
