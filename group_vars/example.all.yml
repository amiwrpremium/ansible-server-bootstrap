---
# SSH
ssh_port: 2222
ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... you@example.com"

# System
hostname: "server"
timezone: "UTC"
system_locale: "en_US.UTF-8"
nofile_limit: 65535

# Swap
swap_size: "1G"
swap_swappiness: "10"

# Security
ssh_max_auth_tries: 3
fail2ban_bantime: 3600
fail2ban_findtime: 600
fail2ban_maxretry: 3

# Node Exporter
node_exporter_version: "1.11.1"
node_exporter_listen_address: "127.0.0.1:9100"

# Automatic Updates
unattended_upgrades_mail: ""
unattended_upgrades_auto_reboot: false
unattended_upgrades_auto_reboot_time: "02:00"
