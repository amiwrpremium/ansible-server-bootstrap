---
- name: Server Bootstrap
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Validate Ubuntu version
      ansible.builtin.fail:
        msg: "This playbook requires Ubuntu 24.04 or later. Detected: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
      when: ansible_facts['distribution'] != 'Ubuntu' or ansible_facts['distribution_version'] is version('24.04', '<')

    - name: Detect deprecated ssh_public_key scalar
      ansible.builtin.fail:
        msg: |
          `ssh_public_key` (scalar) has been replaced by `ssh_public_keys` (list).
          Update group_vars/all.yml:
            ssh_public_keys:
              - "ssh-ed25519 AAAA... you@example.com"
      when: ssh_public_key is defined

    - name: Validate ssh_public_keys is configured
      ansible.builtin.fail:
        msg: "ssh_public_keys is not configured. Set at least one real key in group_vars/all.yml."
      when: ssh_public_keys | length == 0 or 'CHANGE_ME' in ssh_public_keys

    - name: Validate each SSH public key format
      ansible.builtin.fail:
        msg: "Invalid SSH public key format: '{{ item[:40] }}...'. Expected: 'ssh-ed25519 AAAA...' or similar."
      loop: "{{ ssh_public_keys }}"
      when: not (item is match("^(ssh-(ed25519|rsa|dss)|ecdsa-sha2-nistp(256|384|521)|sk-(ssh-ed25519|ecdsa-sha2-nistp256)@openssh\\.com) [A-Za-z0-9+/=]+"))

    - name: Validate ansible_host is configured
      ansible.builtin.fail:
        msg: "ansible_host is not configured. Set the server IP in inventory/hosts.yml"
      when: ansible_host == 'CHANGE_ME' or ansible_host | length == 0

  roles:
    - { role: base, tags: ['base'] }
    - { role: security, tags: ['security'] }
    - { role: docker, tags: ['docker'] }
    - { role: tools, tags: ['tools'] }
    - { role: monitoring, tags: ['monitoring'] }
