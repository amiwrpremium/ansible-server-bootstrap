[defaults]
inventory = inventory/hosts.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
callbacks_enabled = timer, profile_tasks
timeout = 120
gather_timeout = 120

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=no -o ServerAliveInterval=5 -o ServerAliveCountMax=60 -o ConnectTimeout=60 -o ConnectionAttempts=10 -o TCPKeepAlive=yes
retries = 10
