---
- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Check if node_exporter exists
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: monitoring_node_exporter_binary

- name: Get architecture
  ansible.builtin.command: uname -m
  register: monitoring_arch_raw
  changed_when: false
  when: not monitoring_node_exporter_binary.stat.exists

- name: Set architecture
  ansible.builtin.set_fact:
    # yamllint disable-line rule:line-length
    monitoring_node_exporter_arch: >-
      {{ 'amd64' if monitoring_arch_raw.stdout == 'x86_64'
      else 'arm64' if monitoring_arch_raw.stdout == 'aarch64'
      else monitoring_arch_raw.stdout }}
  when: not monitoring_node_exporter_binary.stat.exists

- name: Download node_exporter
  ansible.builtin.get_url:
    # yamllint disable-line rule:line-length
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ monitoring_node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter.tar.gz"
    mode: '0644'
  when: not monitoring_node_exporter_binary.stat.exists
  register: monitoring_node_exporter_download
  until: monitoring_node_exporter_download is succeeded
  retries: 3
  delay: 5

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: true
  when: not monitoring_node_exporter_binary.stat.exists

- name: Install node_exporter
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ monitoring_node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: true
    mode: '0755'
  when: not monitoring_node_exporter_binary.stat.exists
  notify: Restart node_exporter

- name: Cleanup
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/node_exporter.tar.gz
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ monitoring_node_exporter_arch | default('amd64') }}"
  ignore_errors: true

- name: Create systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter --web.listen-address={{ node_exporter_listen_address }} --collector.systemd --collector.processes
      Restart=always
      RestartSec=5
      NoNewPrivileges=yes
      ProtectHome=yes
      ProtectSystem=strict

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
