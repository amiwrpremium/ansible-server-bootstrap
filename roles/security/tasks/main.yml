---
# SSH

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: '0700'
    owner: root
    group: root
  tags: [ssh]

- name: Add authorized SSH keys
  ansible.posix.authorized_key:
    user: root
    state: present
    exclusive: "{{ ssh_authorized_keys_exclusive | default(true) }}"
    key: "{{ ssh_public_keys | join('\n') }}"
  tags: [ssh]

# dev-sec's ssh_hardening expects a space-separated AllowGroups string, but our
# public var is a list. Convert here (a self-referencing include var would recurse).
- name: Build AllowGroups string for ssh_hardening
  ansible.builtin.set_fact:
    security_ssh_allow_groups_str: "{{ ssh_allow_groups | join(' ') }}"
  tags: [ssh]

# Delegate sshd hardening (ciphers/MACs/KEX, auth policy, sshd_config) to dev-sec.
# The role notifies its own restart handler, which our end-of-role flush_handlers
# applies on the new port; "Verify SSH is reachable" then confirms it.
- name: Harden SSH daemon (dev-sec)
  ansible.builtin.include_role:
    name: devsec.hardening.ssh_hardening
  vars:
    ssh_server_ports: ["{{ ssh_port }}"]
    ssh_permit_root_login: "{{ ssh_permit_root_login | default('prohibit-password') }}"
    ssh_server_password_login: false
    ssh_allow_groups: "{{ security_ssh_allow_groups_str }}"
    ssh_max_auth_retries: "{{ ssh_max_auth_tries }}"
    ssh_banner: true
    ssh_banner_path: /etc/ssh/banner
  tags: [ssh]

- name: Create SSH banner
  ansible.builtin.copy:
    dest: /etc/ssh/banner
    content: |
      **************************************************************************
      UNAUTHORIZED ACCESS PROHIBITED. All connections are monitored.
      **************************************************************************
    owner: root
    group: root
    mode: '0644'
  tags: [ssh]

# UFW

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  register: security_ufw_install
  until: security_ufw_install is succeeded
  retries: 3
  delay: 5
  tags: [firewall]

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  tags: [firewall]

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  tags: [firewall]

# Trusted sources are allowed before the rate-limit rule so repeated connections
# (e.g. an Ansible control machine) are not throttled by "ufw limit".
- name: Allow SSH from trusted source IPs
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    from_ip: "{{ item }}"
  loop: "{{ ufw_ssh_allow_from }}"
  tags: [firewall]

- name: Rate limit SSH on custom port
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: tcp
  tags: [firewall]

- name: Allow additional UFW ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ ufw_allow_ports }}"
  tags: [firewall]

- name: Enable UFW
  community.general.ufw:
    state: enabled
  tags: [firewall]

# Fail2ban

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  register: security_fail2ban_install
  until: security_fail2ban_install is succeeded
  retries: 3
  delay: 5
  tags: [fail2ban]

- name: Configure fail2ban
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Restart fail2ban
  tags: [fail2ban]

- name: Enable fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  tags: [fail2ban]

# Kernel hardening
# The sysctl network/kernel params, /dev/shm mount, and module blacklist are
# delegated to dev-sec's os_hardening role (see "Harden the OS" below). BBR is
# kept here because os_hardening does not manage congestion control.

- name: Ensure the tcp_bbr module is available
  community.general.modprobe:
    name: tcp_bbr
    state: present
  failed_when: false
  tags: [kernel]

- name: Read available TCP congestion control algorithms
  ansible.builtin.slurp:
    src: /proc/sys/net/ipv4/tcp_available_congestion_control
  register: security_tcp_cc
  tags: [kernel]

- name: Enable TCP BBR congestion control
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-bbr.conf
    reload: true
  loop:
    - { name: 'net.core.default_qdisc', value: 'fq' }
    - { name: 'net.ipv4.tcp_congestion_control', value: 'bbr' }
  when: "'bbr' in (security_tcp_cc.content | b64decode)"
  tags: [kernel]

# Delegate OS hardening (network/kernel sysctls, /dev/shm, module blacklist,
# login.defs, PAM/pwquality, auditd, umask/suid) to dev-sec. sysctl_overwrite
# re-asserts IP forwarding for Docker; os_unused_filesystems keeps vfat/squashfs
# OFF the blacklist so UEFI hosts (/boot/efi is vfat) still boot.
- name: Harden the OS (dev-sec)
  ansible.builtin.include_role:
    name: devsec.hardening.os_hardening
  vars:
    sysctl_overwrite:
      net.ipv4.ip_forward: 1
    os_unused_filesystems:
      - cramfs
      - freevxfs
      - jffs2
      - hfs
      - hfsplus
      - udf
      - dccp
      - sctp
      - rds
      - tipc
  tags: [kernel]

# Unattended upgrades

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  register: security_uu_install
  until: security_uu_install is succeeded
  retries: 3
  delay: 5
  tags: [updates]

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'
  tags: [updates]

- name: Enable automatic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
    owner: root
    group: root
    mode: '0644'
  tags: [updates]

- name: Install needrestart
  ansible.builtin.apt:
    name: needrestart
    state: present
  register: security_needrestart_install
  until: security_needrestart_install is succeeded
  retries: 3
  delay: 5
  tags: [updates]

- name: Configure needrestart to automatic mode
  ansible.builtin.lineinfile:
    path: /etc/needrestart/needrestart.conf
    regexp: '^\$nrconf\{restart\}'
    line: "$nrconf{restart} = 'a';"
  tags: [updates]

# Keep needrestart's automatic mode from bouncing SSH during package upgrades,
# which would drop the live admin/Ansible connection mid-run.
- name: Exclude SSH from needrestart automatic restarts
  ansible.builtin.copy:
    dest: /etc/needrestart/conf.d/no-ssh-restart.conf
    content: |
      # Managed by ansible-server-bootstrap: never auto-restart SSH.
      $nrconf{override_rc} = {
          qr(^ssh(d)?\.service$) => 0,
      };
    owner: root
    group: root
    mode: '0644'
  tags: [updates]

- name: Lock root password
  ansible.builtin.user:
    name: root
    password_lock: true
  tags: [ssh]

# Audit tooling

- name: Install Lynis
  ansible.builtin.apt:
    name: lynis
    state: present
  register: security_lynis_install
  until: security_lynis_install is succeeded
  retries: 3
  delay: 5
  tags: [audit]

- name: Configure Lynis custom profile
  ansible.builtin.template:
    src: lynis-custom.prf.j2
    dest: /etc/lynis/custom.prf
    owner: root
    group: root
    mode: '0644'
  tags: [audit]

# Log forwarding

- name: Install rsyslog
  ansible.builtin.apt:
    name: rsyslog
    state: present
  register: security_rsyslog_install
  until: security_rsyslog_install is succeeded
  retries: 3
  delay: 5
  tags: [syslog]

- name: Configure remote syslog forwarding
  ansible.builtin.template:
    src: rsyslog-remote.conf.j2
    dest: /etc/rsyslog.d/50-remote.conf
    owner: root
    group: root
    mode: '0644'
    backup: true
  when: remote_syslog_host | length > 0
  notify: Restart rsyslog
  tags: [syslog]

- name: Remove remote syslog forwarding config when disabled
  ansible.builtin.file:
    path: /etc/rsyslog.d/50-remote.conf
    state: absent
  when: remote_syslog_host | length == 0
  notify: Restart rsyslog
  tags: [syslog]

- name: Enable rsyslog service
  ansible.builtin.systemd:
    name: rsyslog
    state: started
    enabled: true
  tags: [syslog]

# Reboot check

- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: security_reboot_required
  tags: [reboot]

- name: Warn if reboot is required
  ansible.builtin.debug:
    msg: "WARNING: A system reboot is required (likely due to a kernel update). Please schedule a reboot."
  when: security_reboot_required.stat.exists
  tags: [reboot]

# SSH reachability verification

- name: Flush handlers so SSH restart completes before verification
  ansible.builtin.meta: flush_handlers

- name: Verify SSH is reachable on the configured port
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: "{{ ssh_port }}"
    state: started
    timeout: 60
    delay: 5
  delegate_to: localhost
  become: false
  tags: [ssh]
