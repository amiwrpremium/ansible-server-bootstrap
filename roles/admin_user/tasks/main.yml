---
# Create (or adopt) the non-root sudo user that people log in as after bootstrap.
# Idempotent: works whether the provider already made the user (e.g. cloud "ubuntu")
# or the box only has root. Runs before the security role locks SSH down.

- name: Validate admin_user format
  ansible.builtin.fail:
    msg: "admin_user must be POSIX-valid: lowercase letter or underscore start, then [a-z0-9_-], max 32 chars. Got: '{{ admin_user }}'"
  when: not (admin_user is match("^[a-z_][a-z0-9_-]{0,31}$"))
  tags: [admin_user]

- name: Reject system-reserved admin_user
  ansible.builtin.fail:
    msg: "Refusing to use '{{ admin_user }}' as admin_user — reserved for the system."
  vars:
    reserved_users:
      - root
      - daemon
      - bin
      - sys
      - sync
      - games
      - man
      - lp
      - mail
      - news
      - uucp
      - proxy
      - www-data
      - backup
      - list
      - irc
      - gnats
      - nobody
      - systemd-network
      - systemd-resolve
      - systemd-timesync
      - messagebus
      - syslog
      - apt
      - uuidd
      - tcpdump
      - landscape
      - pollinate
      - sshd
      - lxd
      - node_exporter
  when: admin_user in reserved_users
  tags: [admin_user]

- name: Create the admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    shell: "{{ admin_user_shell | default('/bin/bash') }}"
    groups: sudo
    append: true
    create_home: true
    state: present
  tags: [admin_user]

- name: Authorize SSH keys for the admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    state: present
    exclusive: "{{ ssh_authorized_keys_exclusive | default(true) }}"
    key: "{{ ssh_public_keys | join('\n') }}"
  tags: [admin_user]

- name: Grant passwordless sudo to the admin user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  tags: [admin_user]
