---
- name: Remove conflicting packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent
  ignore_errors: true

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  register: docker_gpg_download
  until: docker_gpg_download is succeeded
  retries: 3
  delay: 5

- name: Get Ubuntu codename
  ansible.builtin.shell: . /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}
  register: docker_ubuntu_codename
  changed_when: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    # yamllint disable-line rule:line-length
    repo: >-
      deb [arch={{ ansible_facts['architecture'] | regex_replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ docker_ubuntu_codename.stdout }} stable
    filename: docker
    state: present
  register: docker_repo_add
  until: docker_repo_add is succeeded
  retries: 3
  delay: 5

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  register: docker_install
  until: docker_install is succeeded
  retries: 3
  delay: 5

- name: Start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "live-restore": true
      }
    mode: '0644'
  notify: Restart Docker
