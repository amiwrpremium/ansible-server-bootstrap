name: Bug Report
description: Report a bug or playbook failure
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste the full Ansible error output here.
      render: text
    validations:
      required: true

  - type: input
    id: ansible-version
    attributes:
      label: Ansible Version
      description: Output of `ansible --version`
      placeholder: "ansible [core 2.17.0]"
    validations:
      required: true

  - type: input
    id: target-os
    attributes:
      label: Target OS
      description: Ubuntu version on the target server
      placeholder: "Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Which role is affected?
      options:
        - base
        - security
        - docker
        - tools
        - monitoring
        - create-user
        - Multiple / Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: What commands did you run?
      placeholder: |
        1. Configured inventory and variables
        2. Ran `make bootstrap`
        3. Got error at task "..."
    validations:
      required: false
