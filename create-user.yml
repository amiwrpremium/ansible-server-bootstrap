---
- name: Create a new sudo user
  hosts: all
  become: true
  gather_facts: false

  vars_prompt:
    - name: username
      prompt: "Enter the username to create"
      private: false

    - name: user_ssh_public_key
      prompt: "Enter the SSH public key for the user"
      private: false

    - name: user_shell
      prompt: "Enter the shell (default: /bin/bash)"
      default: "/bin/bash"
      private: false

  tasks:
    - name: Validate username format
      ansible.builtin.fail:
        msg: "Username must be POSIX-valid: lowercase letter or underscore start, then [a-z0-9_-], max 32 chars. Got: '{{ username }}'"
      when: not (username is match("^[a-z_][a-z0-9_-]{0,31}$"))

    - name: Reject system-reserved usernames
      ansible.builtin.fail:
        msg: "Refusing to create/modify user '{{ username }}' — reserved for the system."
      vars:
        reserved_users:
          - root
          - daemon
          - bin
          - sys
          - sync
          - games
          - man
          - lp
          - mail
          - news
          - uucp
          - proxy
          - www-data
          - backup
          - list
          - irc
          - gnats
          - nobody
          - systemd-network
          - systemd-resolve
          - systemd-timesync
          - messagebus
          - syslog
          - apt
          - uuidd
          - tcpdump
          - landscape
          - pollinate
          - sshd
          - lxd
          - node_exporter
      when: username in reserved_users

    - name: Validate SSH public key format
      ansible.builtin.fail:
        msg: "SSH public key doesn't look valid. Expected format: 'ssh-ed25519 AAAA...', 'ssh-rsa AAAA...', 'ecdsa-sha2-... AAAA...', or a sk-* FIDO variant."
      # yamllint disable-line rule:line-length
      when: not (user_ssh_public_key is match("^(ssh-(ed25519|rsa|dss)|ecdsa-sha2-nistp(256|384|521)|sk-(ssh-ed25519|ecdsa-sha2-nistp256)@openssh\\.com) [A-Za-z0-9+/=]+"))

    - name: Create user
      ansible.builtin.user:
        name: "{{ username }}"
        shell: "{{ user_shell }}"
        groups: sudo
        append: true
        create_home: true
        state: present

    - name: Add SSH key for user
      ansible.posix.authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ user_ssh_public_key }}"

    - name: Allow passwordless sudo
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ username }}"
        content: "{{ username }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Display created user info
      ansible.builtin.debug:
        msg: "User '{{ username }}' created with sudo access and SSH key authentication."
